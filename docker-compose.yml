services:
  authentication:
    build: .
    container_name: authentication
    ports:
      - $PORT:$PORT
    environment:
      - PORT
    volumes:
      - "config:/etc/authconfig"
    image: lucas42/lucos_authentication
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${PORT}/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  config: